name = "substracker1"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
name = "subscription-manager"

[env.staging]
name = "subscription-manager-staging"

# KV 命名空间配置（默认模板不预设固定 ID，运行 npm run setup 自动生成）

# 静态资源：托管 public/ 目录下的 JS/CSS/HTML 给浏览器
# 使用方式：浏览器访问 /js/lib/api-client.js 等同于 public/js/lib/api-client.js
# 不命中静态资源的请求由 Worker fetch handler 处理（默认行为）
[assets]
directory = "./public"
binding = "ASSETS"

# 定时任务配置 - 每小时检查一次（UTC）
[triggers]
crons = ["0 * * * *"]

# 环境变量（可选，也可以在 Cloudflare Dashboard 中设置）
[vars]
ENVIRONMENT = "SUBSCRIPTIONS_KV"
